workers:
  max_transcription_workers: 15
  max_feature_workers: 15
  max_clip_workers: 8

chunking:
  min_seconds: 30
  max_seconds: 120
  overlap_seconds: 2
  bitrate: "64k"
  keep_chunks: true

storage:
  root: ./storage
  jobs_root: ./storage/jobs

job:
  retry_count: 3
  transcription_provider: "faster-whisper"
  transcription_timeout_seconds: 600
  export_timeout_seconds: 600

whisper:
  model_size: "auto"
  device: "cuda"
  compute_type: "auto"
  beam_size: 5
  language: null
  vad_filter: true
  vad_min_silence_ms: 500

thresholds:
  min_segment_seconds: 1.2
  min_candidate_score: 0.35
  preview_top_k: 20

semantic:
  batch_size: 10
  context_overlap: 2
  batch_delay_seconds: 0.0

models:
  groq_llama_8b:
    name: "llama-3.1-8b-instant"
    provider: "groq"
    context_window: 128000
    max_input_tokens: 126000
    max_output_tokens: 2000
    rpm_limit: 30
    tpm_limit: 6000
    rpd_limit: 14400
    chars_per_token: 3.7

scheduler:
  workers: 1
  max_retries: 3
  base_delay: 2.0
  max_delay: 30.0
  request_timeout: 90.0
  circuit_breaker:
    failure_threshold: 3
    open_duration: 60.0
