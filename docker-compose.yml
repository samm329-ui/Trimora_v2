version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - TRIMORA_STORAGE_ROOT=/app/storage
      - TRIMORA_JOBS_ROOT=/app/storage/jobs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
